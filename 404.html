<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sistema não encontrado | Portfólio Arduino</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .error-code {
            font-family: var(--font-display);
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 2px var(--color-accent-primary);
            position: relative;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-code::before {
            content: '404';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: var(--color-accent-primary);
            filter: blur(15px);
            opacity: 0.5;
            z-index: -1;
            animation: pulse 2s infinite;
        }
        .error-msg {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            color: var(--color-text-secondary);
            margin-bottom: 3rem;
            max-width: 600px;
        }
        .error-msg span {
            color: var(--color-accent-secondary);
        }
        .glitch-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 0;
        }
        .content-z {
            z-index: 1;
            position: relative;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="glitch-bg"></div>
    <div class="error-page content-z">
        <div class="error-code">404</div>
        <div class="error-msg">
            &gt; ERR_FILE_NOT_FOUND <br>
            &gt; O caminho especificado não existe neste servidor.<br>
            &gt; Tentando reiniciar a conexão com <span>robertoatila.github.io</span>... falha.
        </div>
        <a href="/Portf-lios-de-Projetos-Arduino/" class="btn-primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Voltar para a Base
        </a>
    </div>
    <div class="custom-cursor" id="cursor" aria-hidden="true"></div>
    <script src="404.js"></script>
</body>
</html>
